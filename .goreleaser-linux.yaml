version: 2

project_name: cloudlogin

before:
  hooks:
    - go mod tidy

builds:
  - id: cloudlogin-linux
    main: ./main.go
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: linux-archives
    ids:
      - cloudlogin-linux
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: false
    files:
      - README.md
      - ARCHITECTURE.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_linux_checksums.txt"
  algorithm: sha256

changelog:
  disable: true
